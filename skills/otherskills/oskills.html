<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Other Skills</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="oskills.css">
</head>
<body>
    
    <div class="container">
        <h1>Other Skills</h1>
        
        <div class="skills-chart-container">
            <div class="skill-chart-item">
                <div class="skill-info">
                    <span><i class="fa-solid fa-book-open"></i> Merangkum</span>
                    <span class="skill-percentage">85%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" data-progress="85%"></div>
                </div>
            </div>

            <div class="skill-chart-item">
                <div class="skill-info">
                    <span><i class="fa-solid fa-pen-nib"></i> Menulis Cerita Fiksi</span>
                    <span class="skill-percentage">80%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" data-progress="80%"></div>
                </div>
            </div>

            <div class="skill-chart-item">
                <div class="skill-info">
                    <span><i class="fa-solid fa-seedling"></i> Bertani</span>
                    <span class="skill-percentage">70%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" data-progress="70%"></div>
                </div>
            </div>

            <div class="skill-chart-item">
                <div class="skill-info">
                    <span><i class="fa-solid fa-palette"></i> Menggambar</span>
                    <span class="skill-percentage">90%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" data-progress="90%"></div>
                </div>
            </div>

            <div class="skill-chart-item language-section">
                <div class="skill-info main-lang">
                    <span><i class="fa-solid fa-language"></i> Kemampuan Multibahasa</span>
                </div>
                
                <div class="sub-languages">
                    <div class="sub-lang-item">
                        <div class="skill-info">
                            <span>Bahasa Indonesia</span>
                            <span class="skill-percentage">90%</span>
                        </div>
                        <div class="progress-bar sub-bar">
                            <div class="progress-fill" data-progress="90%"></div>
                        </div>
                    </div>
                    
                    <div class="sub-lang-item">
                        <div class="skill-info">
                            <span>Bahasa Sunda</span>
                            <span class="skill-percentage">100%</span>
                        </div>
                        <div class="progress-bar sub-bar">
                            <div class="progress-fill" data-progress="100%"></div>
                        </div>
                    </div>

                    <div class="sub-lang-item">
                        <div class="skill-info">
                            <span>Bahasa Jepang</span>
                            <span class="skill-percentage">45%</span>
                        </div>
                        <div class="progress-bar sub-bar">
                            <div class="progress-fill" data-progress="45%"></div>
                        </div>
                    </div>

                    <div class="sub-lang-item">
                        <div class="skill-info">
                            <span>Bahasa Arab</span>
                            <span class="skill-percentage">75%</span>
                        </div>
                        <div class="progress-bar sub-bar">
                            <div class="progress-fill" data-progress="75%"></div>
                        </div>
                    </div>

                    <div class="sub-lang-item">
                        <div class="skill-info">
                            <span>Bahasa Inggris</span>
                            <span class="skill-percentage">80%</span>
                        </div>
                        <div class="progress-bar sub-bar">
                            <div class="progress-fill" data-progress="80%"></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <footer>
        <div class="media-sosial">
            <a href="https://www.instagram.com/yourusername" target="_blank"><i class="fa-brands fa-instagram"></i></a>

    </footer>

    <script src="oskills.js"></script>
</body>
</html>
