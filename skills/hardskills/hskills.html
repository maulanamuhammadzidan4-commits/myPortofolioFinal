<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hard Skills</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="hskills.css">
</head>
<body>
    <h1><i class="fa-solid fa-tools"></i>Hard Skills</h1>
    <div class="container">
        <div class="skills">
            <ul>
                <li><i class="fa-brands fa-html5"></i>HTML</li>
                <li><i class="fa-brands fa-css3-alt"></i>CSS</li>
                <li><i class="fa-brands fa-js"></i>JavaScript</li>
                <li><i class="fa-brands fa-python"></i>Python</li>
                <li><i class="fa-brands fa-php"></i>PHP</li>
                <li><i class="fa-brands fa-git-alt"></i>Git</li>
            </ul>
        </div>
    </div>

    <div id="skill-modal" class="modal">
        <span class="close-skill">&times;</span>
        <div class="modal-content">
            <i id="skill-icon"></i>
            <h2 id="skill-title"></h2>
            <p id="skill-desc"></p>
        </div>
    </div>

    <footer>
        <div class="media-sosial">
            <a href="https://www.instagram.com/yourusername" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.linkedin.com/in/yourusername" target="_blank"><i class="fa-brands fa-linkedin"></i></a>

        </div><br>

    </footer>

    <script src="hskills.js"></script>
